name: Build Windows EXE (Light)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # возможность запуска вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository   # скачиваем код
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install UPX (compressor)
        run: choco install upx -y

      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name URLChecker main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: URLChecker-Windows-Light
          path: dist/URLChecker.exe
