name: Build Windows EXE (Go + Fyne + UPX)

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # позволяет запускать вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install MinGW (C compiler for Fyne)
        run: choco install mingw -y

      - name: Install UPX
        run: choco install upx -y

      - name: Initialize Go module
        run: go mod init url-checker          # ← создаёт go.mod

      - name: Download dependencies
        run: go mod tidy                      # ← подтягивает fyne и excelize

      - name: Build binary
        run: go build -ldflags="-s -w" -o URLChecker.exe .

      - name: Compress with UPX
        run: upx --best --lzma URLChecker.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: URLChecker-Windows
          path: URLChecker.exe
